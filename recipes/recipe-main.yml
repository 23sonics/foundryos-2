---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: foundryos-2
description: customised Fedora Atomic image for my own personal use (main Plasma variant)

base-image: ghcr.io/ublue-os/kinoite-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - gwenview
        - haruna
        - kasts
        - kontact
        - kcalc
        - kolourpaint
    replace:
      - from-repo: updates
        packages:
          - old: sddm
            new: plasma-login-manager
        allow-erasing: true

  - from-file: common.yml
