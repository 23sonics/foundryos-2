---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

modules:
  - type: dnf
    repos:
      nonfree: rpmfusion
    install:
      packages:
        - discord

  - type: dnf
    repos:
      cleanup: true
      nonfree: negativo17
    install:
      packages:
        - webkit2gtk4.1
        - audacious
        - libburn
        - cdrskin
        - k3b
        - steam
        - ffmpeg
        - yt-dlp
        - virt-manager
        - kolourpaint
        - ckb-next
        - mediawriter

  - type: dnf
    install:
      packages:
        - https://github.com/patryk-ku/music-discord-rpc/releases/latest/download/music-discord-rpc.rpm

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system

  - type: signing
