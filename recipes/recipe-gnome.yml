---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: foundryos-gnome
description: customised Fedora Atomic image for my own personal use (GNOME variant)

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - papers
        - showtime
        - gnome-calculator
        - loupe
        - baobab
        - gnome-clocks
        - gnome-maps
        - gnome-calendar
        - gnome-contacts
        - gnome-text-editor
        - gnome-connections
        - gnome-extensions-app
        - gnome-logs
        - gnome-font-viewer
        - gnome-shell-extension-blur-my-shell
        - gnome-shell-extension-gsconnect
        - nautilus-gsconnect

  - from-file: common.yml
